      --wl-muted: #6b6866;
      --wl-accent: #c9a84c;
      --wl-correct: #4a7c59;
      --wl-present: #b07d2e;
      --wl-absent: #2e2e2e;
      --wl-correct-light: #6aad7c;
      --wl-present-light: #e0a03a;
      --wl-key-bg: #333230;
      --wl-key-text: #f0ede6;

      pointer-events: none;
      z-index: 0;
      opacity: 0.025;

      max-width: 520px;
      padding: 0 16px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;

    #wl-header {
      width: 100%;

      align-items: center;
      justify-content: center;
      padding: 24px 0 16px;
      border-bottom: 0.5px solid var(--wl-border);
      margin-bottom: 28px;
      position: relative;
    }
    #wl-title {
      font-family: 'Playfair Display', serif;
      font-weight: 900;
      font-size: 2.2rem;

      color: var(--wl-text);
      text-transform: uppercase;
      margin: 0;

    #wl-title span { color: var(--wl-accent); }
    #wl-streak {

      right: 0;
      font-size: 11px;
      color: var(--wl-muted);
      text-align: right;
      line-height: 1.5;
    }
    #wl-streak strong {
      display: block;
      color: var(--wl-accent);
      font-size: 18px;
      font-weight: Dodd;
      font-weight: 500;
    }
    #wl-toast-container {
      position: absolute;
      top: 80px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: center;
      pointer-events: none;
      width: 100%;

    .wl-toast {

      color: var(--wl-bg);

      margin-bottom: 28px;
    }
    .wl-row {

      grid-template-columns: repeat(5, 1fr);
      gap: 7px;
    }

      height: 62px;

      background: var(--wl-tile-empty);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: 1.8rem;
      color: var(--wl-text);
      text-transform: uppercase;
      position: relative;
      transition: border-color 0.1s;
      user-select: none;

      gap: 7px;
      width: 100%;

    }
    .wl-kb-row { display: flex; justify-content: center; gap: 5px; }
    .wl-key {

      min-width: 40px;
      padding: 0 8px;
      background: var(--wl-key-bg);
      color: var(--wl-key-text);
      border: none;
      border-radius: 4px;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.05em;

      cursor: pointer;

      align-items: center;
      justify-content: center;

      line-height: 1.6;
      margin-bottom: 8px;

    #wl-divider {

    .wl-stat { text-align: center; }
    .wl-stat-num {

    }
    .wl-stat-label {
      font-size: 10px;
      color: var(--wl-muted);

</div>

  let wlState = {
    word: '',
    guesses: [],
    currentRow: 0,
    currentCol: 0,
    currentGuess: [],
    gameOver: false,
    stats: { played: 0, wins: 0, streak: 0 }
  };

  function wlPickWord() {
    return WL_WORDS[Math.floor(Math.random() * WL_WORDS.length)].toUpperCase();
  }

  function wlBuildGrid() {
    const grid = document.getElementById('wl-grid');
    grid.innerHTML = '';
    for (let r = 0; r < 6; r++) {
      const row = document.createElement('div');
      row.className = 'wl-row';
      row.id = `wl-row-${r}`;
      for (let c = 0; c < 5; c++) {
        const tile = document.createElement('div');
        tile.className = 'wl-tile';
        tile.id = `wl-tile-${r}-${c}`;
        row.appendChild(tile);
      }
      grid.appendChild(row);
    }
  }

  function wlBuildKeyboard() {
    const rows = [
      ['Q','W','E','R','T','Y','U','I','O','P'],
      ['A','S','D','F','G','H','J','K','L'],
      ['ENTER','Z','X','C','V','B','N','M','⌫']
    ];
    const kb = document.getElementById('wl-keyboard');
    kb.innerHTML = '';
    rows.forEach(row => {
      const rowEl = document.createElement('div');
      rowEl.className = 'wl-kb-row';
      row.forEach(key => {
        const btn = document.createElement('button');
        btn.className = 'wl-key' + (key.length > 1 && key !== '⌫' ? ' wl-wide' : '');
        btn.textContent = key;
        btn.id = `wl-key-${key}`;
        btn.setAttribute('data-key', key);
        btn.addEventListener('click', () => wlHandleKey(key));
        rowEl.appendChild(btn);
      });
      kb.appendChild(rowEl);
    });
  }

  function wlHandleKey(key) {
    if (wlState.gameOver) return;
    if (key === '⌫' || key === 'BACKSPACE') {
      wlDeleteLetter();
    } else if (key === 'ENTER') {
      wlSubmitGuess();
    } else if (/^[A-Z]$/.test(key)) {
      wlAddLetter(key);
    }
  }

  function wlAddLetter(letter) {
    if (wlState.currentCol >= 5) return;
    const tile = document.getElementById(`wl-tile-${wlState.currentRow}-${wlState.currentCol}`);
    tile.textContent = letter;
    tile.classList.add('wl-filled');
    wlState.currentGuess.push(letter);
    wlState.currentCol++;
  }

  function wlDeleteLetter() {
    if (wlState.currentCol <= 0) return;
    wlState.currentCol--;
    wlState.currentGuess.pop();
    const tile = document.getElementById(`wl-tile-${wlState.currentRow}-${wlState.currentCol}`);
    tile.textContent = '';
    tile.classList.remove('wl-filled');
    
  }

  const WL_VALID = new Set(WL_WORDS);

  function wlSubmitGuess() {
    if (wlState.currentCol < 5) {
      wlToast('Not enough letters');
      wlShakeRow(wlState.currentRow);
      return;
    }
    const guess = wlState.currentGuess.join('');
    if (!WL_VALID.has(guess.toLowerCase())) {
      wlToast('Not in word list');
      wlShakeRow(wlState.currentRow);
      return;
    }
    const result = wlScoreGuess(guess, wlState.word);
    wlState.guesses.push({ guess, result });
    wlRevealRow(wlState.currentRow, guess, result, () => {
      wlUpdateKeyboard(guess, result);
      const won = result.every(r => r === 'correct');
      if (won) {
        wlState.gameOver = true;
        wlState.stats.played++;
        wlState.stats.wins++;
        wlState.stats.streak++;
        document.getElementById('wl-streak-num').textContent = wlState.stats.streak;
        setTimeout(() => {
          const msgs = ['Genius!','Magnificent!','Impressive!','Splendid!','Great!','Phew!'];
          wlToast(msgs[wlState.currentRow] || 'Correct!');
          setTimeout(wlShowResult, 1200);
        }, 300);
      } else {
        wlState.currentRow++;
        wlState.currentGuess = [];
        wlState.currentCol = 0;
        if (wlState.currentRow >= 6) {
          wlState.gameOver = true;
          wlState.stats.played++;
          wlState.stats.streak = 0;
          document.getElementById('wl-streak-num').textContent = wlState.stats.streak;
          setTimeout(() => {
            wlToast(wlState.word, 3000);
            setTimeout(wlShowResult, 1400);
          }, 300);
        }
      }
    });
  }

  function wlScoreGuess(guess, word) {
    const result = Array(5).fill('absent');
    const wordArr = word.split('');
    const guessArr = guess.split('');
    const used = Array(5).fill(false);

    for (let i = 0; i < 5; i++) {
      if (guessArr[i] === wordArr[i]) {
        result[i] = 'correct';
        used[i] = true;
      }
    }
    for (let i = 0; i < 5; i++) {
      if (result[i] === 'correct') continue;
      for (let j = 0; j < 5; j++) {
        if (!used[j] && guessArr[i] === wordArr[j]) {
          result[i] = 'present';
          used[j] = true;
          break;
        }
      }
    }
    return result;
  }

  function wlRevealRow(row, guess, result, cb) {
    const delay = 300;
    result.forEach((res, i) => {
      setTimeout(() => {
        const tile = document.getElementById(`wl-tile-${row}-${i}`);
        tile.classList.add('wl-flip');
        setTimeout(() => {
          tile.classList.remove('wl-filled');
          tile.classList.add(`wl-${res}`);
        }, delay / 2);
        if (i === 4) setTimeout(cb, delay);
      }, i * delay);
    });
  }

  function wlUpdateKeyboard(guess, result) {
    const priority = { correct: 3, present: 2, absent: 1 };
    const current = {};
    for (let i = 0; i < 5; i++) {
      const l = guess[i];
      const r = result[i];
      if (!current[l] || priority[r] > priority[current[l]]) current[l] = r;
    }
    Object.entries(current).forEach(([letter, res]) => {
      const key = document.getElementById(`wl-key-${letter}`);
      if (!key) return;
      const cp = priority[res];
      const existingClass = ['wl-correct','wl-present','wl-absent'].find(c => key.classList.contains(c));
      if (existingClass) {
        const ep = priority[existingClass.replace('wl-', '')];
        if (cp <= ep) return;
        key.classList.remove(existingClass);
      }
      key.classList.add(`wl-${res}`);
    });
  }

  function wlShakeRow(row) {
    const rowEl = document.getElementById(`wl-row-${row}`);
    rowEl.querySelectorAll('.wl-tile').forEach(t => {
      t.classList.remove('wl-shake');
      void t.offsetWidth;
      t.classList.add('wl-shake');
      t.addEventListener('animationend', () => t.classList.remove('wl-shake'), { once: true });
    });
  }

  function wlBounceRow(row) {
    const rowEl = document.getElementById(`wl-row-${row}`);
    rowEl.querySelectorAll('.wl-tile').forEach((t, i) => {
      setTimeout(() => {
        t.classList.add('wl-bounce');
        t.addEventListener('animationend', () => t.classList.remove('wl-bounce'), { once: true });
      }, i * 80);
    });
  }

  function wlToast(msg, dur = 1800) {
    const container = document.getElementById('wl-toast-container');
    const toast = document.createElement('div');
    toast.className = 'wl-toast';
    toast.textContent = msg;
    container.appendChild(toast);
    setTimeout(() => toast.remove(), dur + 300);
  }

  function wlShowResult() {
    const won = wlState.guesses.length > 0 && wlState.guesses[wlState.guesses.length-1].result.every(r => r === 'correct');
    const panel = document.getElementById('wl-result-panel');
    
    document.getElementById('wl-result-word').textContent = wlState.word;
    document.getElementById('wl-result-msg').textContent = won ? `solved in ${wlState.guesses.length} ${wlState.guesses.length === 1 ? 'try' : 'tries'}` : 'the word was';
    
    // Look up definition
    const def = WL_DEFINITIONS[wlState.word.toLowerCase()] || "No definition available.";
    document.getElementById('wl-result-definition').textContent = def;

    document.getElementById('wl-stat-played').textContent = wlState.stats.played;
    document.getElementById('wl-stat-wins').textContent = wlState.stats.wins;
    document.getElementById('wl-stat-streak').textContent = wlState.stats.streak;
    
    panel.classList.add('wl-visible');
    if (won) setTimeout(() => wlBounceRow(wlState.guesses.length - 1), 100);
  }

  function wlInit() {
    wlState.word = wlPickWord();
    wlState.guesses = [];
    wlState.currentRow = 0;
    wlState.currentCol = 0;
    wlState.currentGuess = [];
    wlState.gameOver = false;
    wlBuildGrid();
    wlBuildKeyboard();
    document.getElementById('wl-result-panel').classList.remove('wl-visible');
  }

  document.getElementById('wl-play-again').addEventListener('click', wlInit);

  document.addEventListener('keydown', e => {
    if (e.ctrlKey || e.metaKey || e.altKey) return;
    const key = e.key.toUpperCase();
    if (key === 'BACKSPACE') wlHandleKey('BACKSPACE');
    else if (key === 'ENTER') wlHandleKey('ENTER');
    else if (/^[A-Z]$/.test(key)) wlHandleKey(key);
  });

  wlInit();
})();
</script>
